# Directory and file filters
included:
  - SwiftUISwiftData
excluded:
  - SwiftUISwiftDataTests
  - SwiftUISwiftDataUITests

# Enabled/disabled rules
analyzer_rules:
  - unused_declaration
  - unused_import
opt_in_rules:
  - all
disabled_rules:
  - contrasted_opening_brace
  - explicit_acl
  - no_magic_numbers
  - vertical_whitespace_between_cases
  - explicit_type_interface
  - explicit_enum_raw_value
  - discouraged_default_parameter
  - explicit_top_level_acl
  - required_deinit
  - no_grouping_extension
  - no_empty_block
  - prefer_key_path
  - redundant_type_annotation
  - file_name
  - type_contents_order

line_length:
  warning: 200
  error: 500
trailing_closure:
  only_single_muted_parameter: true
closure_body_length:
  warning: 50
  error: 100
file_length:
  warning: 500
  error: 1000
identifier_name:
  min_length:
    warning: 2
    error: 1
  